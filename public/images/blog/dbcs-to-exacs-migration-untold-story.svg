<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 840" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Moving from DBCS to ExaCS — The Things Nobody Puts in the Migration Guide!!">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a1614"/>
      <stop offset="100%" stop-color="#2b2623"/>
    </linearGradient>
    <pattern id="grid" x="0" y="0" width="48" height="48" patternUnits="userSpaceOnUse">
      <circle cx="24" cy="24" r="1.2" fill="#3a3532"/>
    </pattern>
    <linearGradient id="redglow" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c74634" stop-opacity="0.18"/>
      <stop offset="40%" stop-color="#c74634" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="1600" height="840" fill="url(#bg)"/>
  <rect width="1600" height="840" fill="url(#grid)" opacity="0.55"/>
  <rect width="1600" height="840" fill="url(#redglow)"/>
  <rect x="0" y="0" width="14" height="840" fill="#c74634"/>

  <!-- Od logo mark (top-right) -->
  <g transform="translate(1440, 72)">
    <rect width="88" height="88" rx="16" fill="#c74634"/>
    <text x="44" y="60" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="800" fill="#ffffff" letter-spacing="-1.2">Od</text>
    <rect x="22" y="68" width="44" height="4" rx="1.5" fill="#ffffff" opacity="0.9"/>
  </g>

  <!-- Category tag -->
  <g transform="translate(88, 120)">
    <rect width="169" height="44" rx="6" fill="#c74634" fill-opacity="0.14" stroke="#c74634" stroke-opacity="0.38" stroke-width="1"/>
    <text x="84.5" y="29" text-anchor="middle" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="14" font-weight="700" fill="#e86454" letter-spacing="2.2">OCI / CLOUD</text>
  </g>

  <!-- Title -->
  <g transform="translate(88, 222)">
    <text font-family="Inter, -apple-system, Segoe UI, sans-serif" font-weight="700" fill="#ffffff" letter-spacing="-2.2" font-size="56">
      <tspan x="0" dy="0">Moving from DBCS to ExaCS — The</tspan>
      <tspan x="0" dy="64">Things Nobody Puts in the</tspan>
      <tspan x="0" dy="64">Migration Guide!!</tspan>
    </text>
  </g>

  <g transform="translate(88, 540)">
    <rect width="1424" height="230" rx="12" fill="#0e0c0b" stroke="#3a3532" stroke-width="1"/>
    <circle cx="28" cy="24" r="6" fill="#e86454"/>
    <circle cx="48" cy="24" r="6" fill="#c5720a"/>
    <circle cx="68" cy="24" r="6" fill="#2f7e4b"/>
    <text font-family="'JetBrains Mono', 'SF Mono', Menlo, monospace" font-size="22" fill="#e8e3dd">
      <tspan x="48" dy="38"><tspan fill="#e86454" font-weight="600">SELECT</tspan> sql_id,</tspan>
      <tspan x="48" dy="34">       ROUND(elapsed_time_total / <tspan fill="#70b0ff">1000000</tspan>, <tspan fill="#70b0ff">2</tspan>)    <tspan fill="#e86454" font-weight="600">AS</tspan> elapsed_sec,</tspan>
      <tspan x="48" dy="34">       executions_total,</tspan>
      <tspan x="48" dy="34">       ROUND(elapsed_time_total /</tspan>
      <tspan x="48" dy="34">             NULLIF(executions_total, <tspan fill="#70b0ff">0</tspan>) / <tspan fill="#70b0ff">1000000</tspan>, <tspan fill="#70b0ff">4</tspan>) <tspan fill="#e86454" font-weight="600">AS</tspan> avg_el…</tspan>
      <tspan x="48" dy="34"><tspan fill="#e86454" font-weight="600">FROM</tspan>   dba_hist_sqlstat s</tspan>
    </text>
  </g>

  <!-- Footer: oradiscuss.com watermark -->
  <text x="88" y="800" font-family="Inter, -apple-system, Segoe UI, sans-serif" font-size="16" font-weight="600" fill="#665f59" letter-spacing="1.5">ORADISCUSS.COM  ·  MAHMOUD DARWISH  ·  ORACLE ACE APPRENTICE</text>
</svg>
